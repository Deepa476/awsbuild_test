version: 0.2

env:
  variables:
    # Default parameters (Can be overridden when starting the CodeBuild execution)
    IS_DEBUG: "false"
    INPUT_FILE: "app-release.aab"
    CONFIG_FILE: "bluebeetle_config.bm"
    MACOS_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/MacOS/MASSTCLI-v1.1.0-darwin-arm64.zip"
    LINUX_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/Linux/MASSTCLI-v1.1.0-linux-amd64.zip"

    # WARNING: Adjust this path based on your target CodeBuild Ubuntu/Linux container layout
    ANDROID_HOME: "/usr/local/android-sdk-linux"

    KEYSTORE_FILE: "Bluebeetle.jks"
    KEYSTORE_PASSWORD: "bugs@1234"
    KEY_ALIAS: "key0"
    KEY_PASSWORD: "bugs@1234"
    IDENTITY: "Apple Distribution: Bugsmirror Research private limited (BPKUYCFJ74)"
    MASST_DIR: "MASSTCLI_EXTRACTED"
    ARTIFACTS_DIR: "output"
    MASST_ZIP: "MASSTCLI"

    SHIELD_LEVEL: "1"

phases:
  install:
    commands:

      - echo "========== INSTALL PHASE =========="

      - export dir=$PWD

      # Install required packages
      - yum update -y
      - yum install -y unzip wget curl zip java-17-amazon-corretto-devel

      # Java
      - export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
      - export PATH=$JAVA_HOME/bin:$PATH

      - java -version
      - echo "JAVA_HOME=$JAVA_HOME"

      ##############################################
      # Android SDK
      ##############################################

      - mkdir -p /opt/android-sdk/cmdline-tools

      - cd /opt

      - curl -L -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

      - unzip -q commandlinetools.zip

      - mkdir -p /opt/android-sdk/cmdline-tools/latest

      - mv cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/

      - rm -rf cmdline-tools
      - rm -f commandlinetools.zip

      - export ANDROID_HOME=/opt/android-sdk
      - export ANDROID_SDK_ROOT=/opt/android-sdk

      - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

      - yes | sdkmanager --licenses

      - sdkmanager "platform-tools"

      - sdkmanager "platforms;android-36"

      - sdkmanager "build-tools;35.0.0"

      - sdkmanager "ndk;27.0.12077973"

      - sdkmanager --list | head -30

      - cd $dir

      ##############################################
      # Download MASST CLI
      ##############################################

      - echo "Downloading MASST CLI..."

      - curl -L -o ${MASST_ZIP}.zip ${LINUX_DOWNLOAD_URL}

      - rm -rf ${MASST_DIR}
      - rm -rf temp_extract

      - mkdir temp_extract

      - unzip -q ${MASST_ZIP}.zip -d temp_extract

      - INNER_DIR=$(find temp_extract -mindepth 1 -maxdepth 1 -type d | head -1)

      - |
        if [ -n "$INNER_DIR" ]; then
          mv "$INNER_DIR" "${MASST_DIR}"
        else
          mkdir -p "${MASST_DIR}"
          mv temp_extract/* "${MASST_DIR}/"
        fi

      - chmod +x $(find ${MASST_DIR} -type f -name "MASSTCLI*" || true)

      - echo "MASST CLI READY"

  build:
    commands:

      - echo "========== BUILD PHASE =========="
      - export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
      - export PATH=$JAVA_HOME/bin:$PATH
      - export ANDROID_HOME=/opt/android-sdk
      - export ANDROID_SDK_ROOT=/opt/android-sdk

      - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/35.0.0:$PATH

      - java -version

      - cd $dir

      - pwd

      - ls -la


      - echo "sdk.dir=/opt/android-sdk" > local.properties


      - echo "systemProp.https.protocols=TLSv1.2,TLSv1.3" >> gradle.properties

      - echo "org.gradle.jvmargs=-Dhttps.protocols=TLSv1.2,TLSv1.3" >> gradle.properties

      ##############################################
      # Verify Keystore
      ##############################################

      - |
        if [ -f "${KEYSTORE_FILE}" ]; then
          echo "Keystore Found"
          ls -lh "${KEYSTORE_FILE}"
        else
          echo "ERROR: Keystore Missing"
          exit 1
        fi

      ##############################################
      # Gradle
      ##############################################

      - chmod +x gradlew

      - ./gradlew --version

      ##############################################
      # Build Bundle
      ##############################################

      - ./gradlew clean

      - ./gradlew bundleProdFlavourRelease --stacktrace --refresh-dependencies

      ##############################################
      # Verify Bundle
      ##############################################

      - echo "Generated Bundles"

      - find . -name "*.aab"

      - |
        if [ -f "${INPUT_FILE}" ]; then
          echo "Bundle Found"
          ls -lh "${INPUT_FILE}"
        else
          echo "ERROR: Bundle Missing"
          find . -name "*.aab"
          exit 1
        fi

      ##############################################
      # Verify BM Config
      ##############################################

      - echo "Searching BM files..."

      - find . -name "*.bm"

      - |
        if [ -f "${CONFIG_FILE}" ]; then
          echo "Config Found"
          ls -lh "${CONFIG_FILE}"
        else
          echo "ERROR: Config Missing"
          exit 1
        fi

      ##############################################
      # MASST SDK Compatibility
      ##############################################

      - mkdir -p $HOME/Android

      - ln -sfn /opt/android-sdk $HOME/Android/Sdk

      - export ANDROID_HOME=$HOME/Android/Sdk
      - export ANDROID_SDK_ROOT=$HOME/Android/Sdk

      - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/35.0.0:$PATH

      - echo "========== ANDROID SDK =========="

      - echo "ANDROID_HOME=$ANDROID_HOME"

      - echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - ls -ld $HOME/Android/Sdk

      - ls -ld $HOME/Android/Sdk/platforms

      - ls -lh $HOME/Android/Sdk/platforms/android-36/android.jar

      - find $HOME/Android/Sdk -name android.jar

      - env | grep ANDROID

      ##############################################
      # Locate MASST Executable
      ##############################################

      - export MASST_EXE=$(find ${MASST_DIR} -type f -name "MASSTCLI*" | head -1)

      - echo "MASST Executable: $MASST_EXE"

      - |
        if [ ! -x "$MASST_EXE" ]; then
          echo "ERROR: MASST Executable Not Found"
          exit 1
        fi

      ##############################################
      # Execute MASST
      ##############################################

      - |
        printf "%s\n" "${SHIELD_LEVEL}" | "$MASST_EXE" \
          -input="${INPUT_FILE}" \
          -config="${CONFIG_FILE}" \
          -keystore="${KEYSTORE_FILE}" \
          -storePassword="${KEYSTORE_PASSWORD}" \
          -alias="${KEY_ALIAS}" \
          -keyPassword="${KEY_PASSWORD}" \
          -v=true \
          -apk

      ##############################################
      # Output
      ##############################################

      - echo "========== OUTPUT =========="

      - ls -la

      - ls -la output || true

      - find output -type f || true

      - find . -name "*.aab"

      - find . -name "*.apk"

      - echo "========== CONFIG =========="

      - cat ${CONFIG_FILE} || true

      - echo "========== FINAL FILES =========="

      - find . \( -name "*.aab" -o -name "*.apk" \)

      - echo "MASST EXECUTION COMPLETED"

  post_build:
    commands:

      - echo "========== POST BUILD =========="

      - rm -rf ${MASST_DIR}

      - rm -rf ${MASST_ZIP}.zip

      - rm -rf temp_extract

      - echo "Cleanup Complete"

artifacts:
  discard-paths: yes
  files:
    - output/*.aab
    - output/*.apk
    - app/build/outputs/bundle/prodFlavourRelease/*.aab
    - app/build/outputs/apk/**/*.apk