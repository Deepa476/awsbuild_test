version: 0.2

env:
  variables:
    IS_DEBUG: "false"
    INPUT_FILE: "app-release.aab"
    CONFIG_FILE: "bluebeetle_config.bm"

    MACOS_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/MacOS/MASSTCLI-v1.1.0-darwin-arm64.zip"
    LINUX_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/Linux/MASSTCLI-v1.1.0-linux-amd64.zip"

    KEYSTORE_FILE: "Bluebeetle.jks"
    KEYSTORE_PASSWORD: "bugs@1234"
    KEY_ALIAS: "key0"
    KEY_PASSWORD: "bugs@1234"

    IDENTITY: "Apple Distribution: Bugsmirror Research private limited (BPKUYCFJ74)"

    MASST_DIR: "MASSTCLI_EXTRACTED"
    MASST_ZIP: "MASSTCLI"
    ARTIFACTS_DIR: "output"

phases:
  install:
    commands:
      - echo "===== INSTALL PHASE ====="

      # Java
      - apt-get update
      - apt-get install -y openjdk-17-jdk curl unzip wget ca-certificates lib32stdc++6 lib32z1
      - update-ca-certificates

      - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - export PATH=$JAVA_HOME/bin:$PATH

      # Android SDK
      - export ANDROID_HOME=/opt/android-sdk
      - export ANDROID_SDK_ROOT=/opt/android-sdk

      - mkdir -p $ANDROID_HOME/cmdline-tools

      - cd /tmp
      - curl -L -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetoolslinux-11076708_latest.zip
      - unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
      - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
      - rm -f cmdline-tools.zip

      - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

      - sdkmanager --version
      - yes | sdkmanager --licenses

      - sdkmanager "platform-tools"
      - sdkmanager "platforms;android-36"
      - sdkmanager "build-tools;35.0.0"
      - sdkmanager "ndk;27.0.12077973"

      - cd $CODEBUILD_SRC_DIR

      # Platform Detection
      - |
        if [ "$(uname)" = "Darwin" ]; then
          echo "MacOS" > platform.txt
          DOWNLOAD_URL=$MACOS_DOWNLOAD_URL
        else
          echo "Linux" > platform.txt
          DOWNLOAD_URL=$LINUX_DOWNLOAD_URL
        fi

      # Download MASST CLI
      - curl -L -o ${MASST_ZIP}.zip ${DOWNLOAD_URL} || wget -O ${MASST_ZIP}.zip ${DOWNLOAD_URL}

      - rm -rf ${MASST_DIR}
      - mkdir -p ${MASST_DIR}
      - unzip -q ${MASST_ZIP}.zip -d ${MASST_DIR}

      - chmod +x $(find ${MASST_DIR} -type f -name "MASSTCLI*" || true)

  pre_build:
    commands:
      - echo "===== VALIDATING INPUTS ====="
      - '[ -f "${INPUT_FILE}" ] || { echo "Missing ${INPUT_FILE}"; exit 1; }'
      - '[ -f "${CONFIG_FILE}" ] || { echo "Missing ${CONFIG_FILE}"; exit 1; }'

      - |
        if [ "$IS_DEBUG" != "true" ]; then
          [ -f "${KEYSTORE_FILE}" ] || {
            echo "Missing ${KEYSTORE_FILE}"
            exit 1
          }
        fi

  build:
    commands:
      - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$JAVA_HOME/bin:$PATH

      - MASST_EXE=$(find ${MASST_DIR} -type f -name "MASSTCLI*" | head -1)

      - |
        if [ ! -f "$MASST_EXE" ]; then
          echo "MASST CLI not found"
          exit 1
        fi

      - chmod +x "$MASST_EXE"

      - EXT=${INPUT_FILE##*.}
      - EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

      - |
        case "$EXT" in

        apk|aab)

          if [ "$IS_DEBUG" = "true" ]; then

            "$MASST_EXE" \
              -input="${INPUT_FILE}" \
              -config="${CONFIG_FILE}"

          else

            "$MASST_EXE" \
              -input="${INPUT_FILE}" \
              -config="${CONFIG_FILE}" \
              -keystore="${KEYSTORE_FILE}" \
              -storePassword="${KEYSTORE_PASSWORD}" \
              -alias="${KEY_ALIAS}" \
              -keyPassword="${KEY_PASSWORD}" \
              -v=true \
              -apk

          fi
          ;;

        ipa|xcarchive)

          "$MASST_EXE" \
            -input="${INPUT_FILE}" \
            -config="${CONFIG_FILE}" \
            -identity="${IDENTITY}"

          ;;

        *)

          echo "Unsupported file type"

          exit 1

          ;;

        esac

  post_build:
    commands:
      - mkdir -p ${ARTIFACTS_DIR}

      - |
        echo "Platform=$(cat platform.txt)" > ${ARTIFACTS_DIR}/report.txt
        echo "Debug=${IS_DEBUG}" >> ${ARTIFACTS_DIR}/report.txt
        echo "Build Time=$(date)" >> ${ARTIFACTS_DIR}/report.txt

      - rm -f ${MASST_ZIP}.zip

      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          echo "Build Successful"
        else
          echo "Build Failed"
        fi

artifacts:
  files:
    - output/**/*